<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{.ServiceName}} — 服务详情</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <style>
        body { background: #f0f2f5; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Noto Sans SC", sans-serif; font-size: 0.875rem; }
        .navbar { background: linear-gradient(135deg, #1a1f36 0%, #2d3561 100%); box-shadow: 0 2px 8px rgba(0,0,0,0.15); padding: 0 1.25rem; height: 56px; }
        .navbar-brand { font-weight: 700; font-size: 1.15rem; }
        .chart-card { background: #fff; border-radius: 10px; box-shadow: 0 1px 4px rgba(0,0,0,0.06); padding: 1.25rem; margin-bottom: 1.25rem; }
        .chart-card h6 { font-weight: 650; font-size: 0.9rem; }
        .chart-card canvas { max-height: 300px; }
    </style>
</head>
<body>

<nav class="navbar navbar-dark">
    <span class="navbar-brand"><i class="bi bi-cpu"></i>kops 资源治理</span>
    <span class="navbar-text">
        <a href="/" class="btn btn-sm btn-outline-light"><i class="bi bi-arrow-left me-1"></i>返回仪表盘</a>
    </span>
</nav>

<div class="container-fluid pt-4 px-4">

<h5 class="mb-3">
    <span class="text-primary">{{.ServiceName}}</span>
    <small class="text-muted ms-2">{{.Namespace}}</small>
    <small class="text-muted ms-3 fs-6">最近 {{.Duration}} 趋势</small>
</h5>

<div class="chart-card">
    <h6><i class="bi bi-cpu me-1"></i>CPU 使用量 (millicores)</h6>
    <canvas id="cpuChart"></canvas>
</div>

<div class="chart-card">
    <h6><i class="bi bi-memory me-1"></i>内存使用量 (MiB)</h6>
    <canvas id="memChart"></canvas>
</div>

<div class="chart-card">
    <h6><i class="bi bi-graph-up me-1"></i>RPS (请求/秒)</h6>
    <canvas id="rpsChart"></canvas>
</div>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.7/dist/chart.umd.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chartjs-adapter-date-fns@3.0.0/dist/chartjs-adapter-date-fns.bundle.min.js"></script>
<script>
function makeLineChart(canvasId, label, points, color) {
    const data = points.map(p => ({ x: p.t * 1000, y: p.v }));
    new Chart(document.getElementById(canvasId), {
        type: 'line',
        data: {
            datasets: [{
                label: label, data: data,
                borderColor: color, backgroundColor: color + '20',
                fill: true, tension: 0.3, pointRadius: 0
            }]
        },
        options: {
            responsive: true, maintainAspectRatio: false,
            plugins: { legend: { display: false } },
            scales: {
                x: {
                    type: 'time',
                    time: { unit: 'minute', displayFormats: { minute: 'HH:mm' } },
                    grid: { color: '#eee' }
                },
                y: { grid: { color: '#eee' }, beginAtZero: true }
            }
        }
    });
}

const cpuPoints = {{.CPUPoints}};
const memPoints = {{.MemPoints}};
const rpsPoints = {{.RPSPoints}};

if (cpuPoints.length > 0) makeLineChart('cpuChart', 'CPU (m)', cpuPoints, '#1a73e8');
if (memPoints.length > 0) makeLineChart('memChart', 'Memory (MiB)', memPoints, '#e37400');
if (rpsPoints.length > 0) makeLineChart('rpsChart', 'RPS', rpsPoints, '#1e8e3e');
</script>
</body>
</html>
